[package]
name = "scanner_signature_app"
version = "0.1.0"
edition = "2021"

[dependencies]
xilem = { version = "0.3", features = ["winit"] }
xilem_core = "0.3"
winit = "0.30"
wgpu = "0.20"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jni = "0.21"
image = "0.25"
uuid = { version = "1", features = ["v4", "serde"] }

[lib]
crate-type = ["rlib", "cdylib"]